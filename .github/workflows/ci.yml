name: CI

on:
  # Run on PRs (covers all feature branches), and on push to main (covers the
  # merge commit). Pushing to a feature branch that has an open PR would
  # otherwise trigger CI twice — once for push and once for pull_request —
  # so we deliberately don't list branches under `push:` other than main.
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# A new push to the same PR (or branch) cancels any in-flight run for it.
# Using head_ref for PRs keeps push and pull_request events in the same group
# so they can cancel each other when they accidentally overlap.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Windows currently has known portability bugs in the indexer/rg path
    # handling (13 unit tests + 3 smoke tests fail). We still build & ship
    # a Windows binary from release.yml, but treat the CI job as
    # informational ("best effort") until a dedicated Windows-portability
    # PR lands. See https://github.com/qdsfdhvh/kotlin-lsp/issues for the
    # tracking issue once it's filed.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install runtime tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          # On Debian/Ubuntu fd is shipped as `fdfind`; the indexer shells out to `fd`.
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install runtime tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep fd

      - name: Install runtime tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # choco is preinstalled on windows-latest runners.
          choco install -y --no-progress ripgrep fd
          # Make sure the newly-installed tools are on PATH for subsequent steps.
          Add-Content $env:GITHUB_PATH 'C:\ProgramData\chocolatey\bin'

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features --no-fail-fast
