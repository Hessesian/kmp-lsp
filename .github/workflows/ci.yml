name: CI

on:
  # Run on every push and PR. We tried a `paths:` filter on (**/*.rs, Cargo.*)
  # to skip docs-only PRs, but on this fork GitHub silently dropped the event
  # — workflow_dispatch worked but push/pull_request never registered a run.
  # The trade-off (a couple of wasted CI minutes on docs/CI-only PRs) is small
  # compared to opaque "where's my CI" debugging, so we trigger unconditionally.
  push:
  pull_request:
  workflow_dispatch:

# A new push to the same ref (branch or PR) cancels any in-flight run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install runtime tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          # On Debian/Ubuntu fd is shipped as `fdfind`; the indexer shells out to `fd`.
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install runtime tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep fd

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features --no-fail-fast
