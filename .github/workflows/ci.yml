name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'skills/**'
      - 'contrib/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install runtime tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install runtime tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep fd

      - name: Install runtime tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress ripgrep fd
          Add-Content $env:GITHUB_PATH 'C:\ProgramData\chocolatey\bin'

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features --no-fail-fast

  build-sidecar-jar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build sidecar JAR
        run: ./gradlew shadowJar
