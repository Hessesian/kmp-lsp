name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: kotlin-lsp
            asset: kotlin-lsp-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: kotlin-lsp
            asset: kotlin-lsp-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-14
            binary: kotlin-lsp
            asset: kotlin-lsp-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            binary: kotlin-lsp
            asset: kotlin-lsp-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: kotlin-lsp.exe
            asset: kotlin-lsp-windows-x86_64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary: kotlin-lsp.exe
            asset: kotlin-lsp-windows-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
          tar -czf dist/${{ matrix.asset }}.tar.gz -C dist ${{ matrix.asset }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}.exe"
          Compress-Archive -Path "dist/${{ matrix.asset }}.exe" -DestinationPath "dist/${{ matrix.asset }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.zip
          if-no-files-found: ignore

  build-sidecar:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: kotlin-jar-indexer-linux-x86_64
          - os: ubuntu-24.04-arm
            asset: kotlin-jar-indexer-linux-aarch64
          - os: macos-latest
            asset: kotlin-jar-indexer-darwin-aarch64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: java-sidecar
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native sidecar
        run: ./gradlew nativeCompile

      - name: Package sidecar
        run: |
          mkdir -p dist
          cp build/native/nativeCompile/kotlin-jar-indexer dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
          tar -czf dist/${{ matrix.asset }}.tar.gz -C dist ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: java-sidecar/dist/${{ matrix.asset }}.tar.gz

  vscode-extension:
    needs: [build, build-sidecar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare VS Code extension
        run: |
          cd contrib/vscode
          npm install

          # Create platform-specific extensions
          mkdir -p bin

          # Extract kotlin-lsp binaries
          for arch in linux-x86_64 linux-aarch64 darwin-x86_64 darwin-aarch64; do
            tar -xzf ../../artifacts/kotlin-lsp-${arch}/kotlin-lsp-${arch}.tar.gz -C bin/
          done

          # Extract sidecar binaries (darwin-x86_64 not built — use aarch64 binary for both macOS targets)
          for arch in linux-x86_64 linux-aarch64 darwin-aarch64; do
            tar -xzf ../../artifacts/kotlin-jar-indexer-${arch}/kotlin-jar-indexer-${arch}.tar.gz -C bin/
          done
          cp bin/kotlin-jar-indexer-darwin-aarch64 bin/kotlin-jar-indexer-darwin-x86_64

      - name: Update extension version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd contrib/vscode
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package universal .vsix (no bundled binary)
        run: |
          cd contrib/vscode
          npx @vscode/vsce package --no-dependencies -o ../../kotlin-lsp-${GITHUB_REF_NAME}.vsix

      - name: Package platform .vsix files
        run: |
          cd contrib/vscode

          # linux-x64
          mkdir -p server
          cp bin/kotlin-lsp-linux-x86_64 server/kotlin-lsp && chmod +x server/kotlin-lsp
          cp bin/kotlin-jar-indexer-linux-x86_64 server/kotlin-jar-indexer && chmod +x server/kotlin-jar-indexer
          npx @vscode/vsce package --no-dependencies --target linux-x64 -o ../../kotlin-lsp-linux-x64-${GITHUB_REF_NAME}.vsix
          rm -rf server

          # linux-arm64
          mkdir -p server
          cp bin/kotlin-lsp-linux-aarch64 server/kotlin-lsp && chmod +x server/kotlin-lsp
          cp bin/kotlin-jar-indexer-linux-aarch64 server/kotlin-jar-indexer && chmod +x server/kotlin-jar-indexer
          npx @vscode/vsce package --no-dependencies --target linux-arm64 -o ../../kotlin-lsp-linux-arm64-${GITHUB_REF_NAME}.vsix
          rm -rf server

          # darwin-x64
          mkdir -p server
          cp bin/kotlin-lsp-darwin-x86_64 server/kotlin-lsp && chmod +x server/kotlin-lsp
          cp bin/kotlin-jar-indexer-darwin-x86_64 server/kotlin-jar-indexer && chmod +x server/kotlin-jar-indexer
          npx @vscode/vsce package --no-dependencies --target darwin-x64 -o ../../kotlin-lsp-darwin-x64-${GITHUB_REF_NAME}.vsix
          rm -rf server

          # darwin-arm64
          mkdir -p server
          cp bin/kotlin-lsp-darwin-aarch64 server/kotlin-lsp && chmod +x server/kotlin-lsp
          cp bin/kotlin-jar-indexer-darwin-aarch64 server/kotlin-jar-indexer && chmod +x server/kotlin-jar-indexer
          npx @vscode/vsce package --no-dependencies --target darwin-arm64 -o ../../kotlin-lsp-darwin-arm64-${GITHUB_REF_NAME}.vsix
          rm -rf server

          # win32-x64 (no bundled sidecar yet — sidecar not yet cross-compiled for Windows)
          mkdir -p server
          unzip -j "../../artifacts/kotlin-lsp-windows-x86_64/kotlin-lsp-windows-x86_64.zip" \
              -d server/
          mv server/kotlin-lsp-windows-x86_64.exe server/kotlin-lsp.exe
          npx @vscode/vsce package --no-dependencies --target win32-x64 -o ../../kotlin-lsp-win32-x64-${GITHUB_REF_NAME}.vsix
          rm -rf server

          # win32-arm64
          mkdir -p server
          unzip -j "../../artifacts/kotlin-lsp-windows-aarch64/kotlin-lsp-windows-aarch64.zip" \
              -d server/
          mv server/kotlin-lsp-windows-aarch64.exe server/kotlin-lsp.exe
          npx @vscode/vsce package --no-dependencies --target win32-arm64 -o ../../kotlin-lsp-win32-arm64-${GITHUB_REF_NAME}.vsix
          rm -rf server

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-packages
          path: "*.vsix"

  release:
    needs: [build, build-sidecar, vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create combined tarballs and individual binaries
        run: |
          mkdir -p release staging

          for platform in linux-x86_64 linux-aarch64 darwin-x86_64 darwin-aarch64; do
            mkdir -p staging/${platform}

            # Extract kotlin-lsp (artifact named kotlin-lsp-${platform} inside the tarball)
            tar -xzf artifacts/kotlin-lsp-${platform}/kotlin-lsp-${platform}.tar.gz \
                -C staging/${platform}/

            # Extract kotlin-jar-indexer (darwin-x86_64 not built — use aarch64 binary)
            sidecar_platform=${platform}
            if [ "${platform}" = "darwin-x86_64" ]; then sidecar_platform="darwin-aarch64"; fi
            tar -xzf artifacts/kotlin-jar-indexer-${sidecar_platform}/kotlin-jar-indexer-${sidecar_platform}.tar.gz \
                -C staging/${platform}/

            # Rename to plain names — no platform suffix inside archives.
            # This is what cargo-binstall, install.sh, and Homebrew expect.
            mv staging/${platform}/kotlin-lsp-${platform}                   staging/${platform}/kotlin-lsp
            mv staging/${platform}/kotlin-jar-indexer-${sidecar_platform}   staging/${platform}/kotlin-jar-indexer

            # Combined tarball — both binaries (preferred for install.sh / Homebrew / mise)
            tar -czf release/kotlin-lsp-${platform}.tar.gz \
                -C staging/${platform} kotlin-lsp kotlin-jar-indexer

            # Individual gzipped binaries — for mason.nvim (rust-analyzer naming style)
            gzip -9 -c staging/${platform}/kotlin-lsp \
                > release/kotlin-lsp-${platform}.gz
            gzip -9 -c staging/${platform}/kotlin-jar-indexer \
                > release/kotlin-jar-indexer-${platform}.gz
          done

          cp artifacts/vsix-packages/*.vsix release/

          # Windows: copy .zip files directly — no combined tarball since sidecar not yet built for Windows.
          for win_asset in windows-x86_64 windows-aarch64; do
            if [ -f "artifacts/kotlin-lsp-${win_asset}/kotlin-lsp-${win_asset}.zip" ]; then
              cp "artifacts/kotlin-lsp-${win_asset}/kotlin-lsp-${win_asset}.zip" release/
            fi
          done

          # SHA256 checksums for all release files (required by aqua-registry, mise, etc.)
          cd release && sha256sum * > sha256sums.txt && cd ..

          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if curl -sf "https://crates.io/api/v1/crates/kotlin-lsp/${VERSION}" >/dev/null; then
            echo "kotlin-lsp ${VERSION} already on crates.io — skipping publish"
          else
            cargo publish --no-verify
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
